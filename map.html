<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国の波と風 - 全国マップ</title>
  <meta name="theme-color" content="#0b1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="全国の波と風">
  <meta property="og:description" content="全国のビーチの風・波・潮位をリアルタイム表示">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0b1929;
      color: #e0e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      background: #0b1929;
      z-index: 1000;
      position: relative;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
    }

    #map {
      flex: 1;
      min-height: 0;
    }

    .leaflet-popup-content-wrapper {
      background: #122640;
      color: #e0e8f0;
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip {
      background: #122640;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
    }
    .popup-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .popup-area {
      font-size: 11px;
      color: #7aa2c4;
      margin-bottom: 8px;
    }
    .popup-btn {
      display: inline-block;
      padding: 8px 16px;
      background: #1a5276;
      color: #7ec8e3;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.2s;
    }
    .popup-btn:hover {
      background: #1f6b9a;
    }

    .legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(18,38,64,0.92);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      z-index: 1000;
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* --- Favorites --- */
    .favorites-bar {
      background: #0d2137;
      padding: 8px 16px;
      z-index: 1000;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .favorites-bar-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .favorites-bar-inner::-webkit-scrollbar { display: none; }
    .fav-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: #1a5276;
      color: #7ec8e3;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .fav-chip:hover { background: #1f6b9a; }
    .favorites-empty {
      font-size: 12px;
      color: #5a7a94;
      padding: 4px 0;
    }

    /* --- Popup favorite button --- */
    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .popup-fav-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      color: #f1c40f;
      flex-shrink: 0;
    }

    /* --- Email subscribe --- */
    .subscribe-section {
      background: #0d2137;
      padding: 20px 16px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .subscribe-section p {
      font-size: 13px;
      color: #7aa2c4;
      margin-bottom: 12px;
    }
    .subscribe-form {
      display: flex;
      gap: 8px;
      max-width: 400px;
      margin: 0 auto;
    }
    .subscribe-form input[type="email"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #2a4a6b;
      border-radius: 8px;
      background: #122640;
      color: #e0e8f0;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      min-width: 0;
    }
    .subscribe-form input[type="email"]::placeholder { color: #5a7a94; }
    .subscribe-form input[type="email"]:focus { border-color: #7ec8e3; }
    .subscribe-form button {
      padding: 10px 16px;
      background: #1a5276;
      color: #7ec8e3;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.2s;
    }
    .subscribe-form button:hover { background: #1f6b9a; }
    .subscribe-msg {
      font-size: 12px;
      color: #2ecc71;
      margin-top: 8px;
      min-height: 1.2em;
    }

    /* --- Guide overlay --- */
    .guide-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .guide-box {
      background: #122640;
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 320px;
      text-align: center;
    }
    .guide-box p {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    .guide-ok-btn {
      display: inline-block;
      padding: 10px 32px;
      background: #1a5276;
      color: #7ec8e3;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.2s;
    }
    .guide-ok-btn:hover { background: #1f6b9a; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">全国の波と風 🌊💨</div>
  </div>

  <div class="favorites-bar" id="favoritesBar"></div>

  <div id="map"></div>

  <div class="legend" id="legend"></div>

  <div class="subscribe-section">
    <p>コンディション通知を受け取りませんか？</p>
    <form class="subscribe-form" id="subscribeForm">
      <input type="email" id="subscribeEmail" placeholder="メールアドレス" required>
      <button type="submit">送信</button>
    </form>
    <div class="subscribe-msg" id="subscribeMsg"></div>
  </div>

  <script src="spots.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const AREA_COLORS = {
      '湘南': '#2ecc71',
      '三浦': '#3498db',
      '千葉': '#e67e22',
      '関西': '#e74c3c',
      '四国': '#9b59b6',
      '宮崎': '#f1c40f',
    };

    const DEFAULT_COLOR = '#7ec8e3';
    const FAV_KEY = 'nami-kaze-favorites';
    const FAV_MAX = 3;
    const GUIDE_KEY = 'nami-kaze-guide-shown';
    const NOTIFY_API = '/api/subscribe';

    function getAreaColor(area) {
      return AREA_COLORS[area] || DEFAULT_COLOR;
    }

    /* --- Favorites helpers --- */
    function getFavorites() {
      try {
        return JSON.parse(localStorage.getItem(FAV_KEY)) || [];
      } catch { return []; }
    }

    function saveFavorites(favs) {
      localStorage.setItem(FAV_KEY, JSON.stringify(favs));
    }

    function isFavorite(name) {
      return getFavorites().includes(name);
    }

    function toggleFavorite(name) {
      const favs = getFavorites();
      const idx = favs.indexOf(name);
      if (idx >= 0) {
        favs.splice(idx, 1);
        saveFavorites(favs);
        return false;
      }
      if (favs.length >= FAV_MAX) {
        alert(`無料版は${FAV_MAX}地点まで`);
        return isFavorite(name);
      }
      favs.push(name);
      saveFavorites(favs);
      return true;
    }

    function renderFavoritesBar() {
      const bar = document.getElementById('favoritesBar');
      const favs = getFavorites();
      if (favs.length === 0) {
        bar.innerHTML = '<div class="favorites-empty">☆ マーカーをタップしてお気に入りに追加</div>';
        return;
      }
      bar.innerHTML = '<div class="favorites-bar-inner">' + favs.map(name => {
        const spot = SPOTS.find(s => s.name === name);
        if (!spot) return '';
        const href = `index.html?lat=${spot.lat}&lon=${spot.lon}&name=${encodeURIComponent(spot.name)}&coast=${spot.coast}`;
        return `<a class="fav-chip" href="${href}">★ ${spot.name}</a>`;
      }).join('') + '</div>';
    }

    /* --- Update popup fav button state --- */
    function updatePopupFavBtn(name) {
      const btn = document.querySelector('.popup-fav-btn');
      if (btn && btn.dataset.name === name) {
        btn.textContent = isFavorite(name) ? '★' : '☆';
      }
    }

    // Initialize map
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true
    }).setView([35.0, 137.0], 6);

    // Dark tile layer
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
    }).addTo(map);

    // Add markers for each spot
    SPOTS.forEach(spot => {
      const color = getAreaColor(spot.area);
      const icon = L.divIcon({
        className: '',
        html: `<svg width="24" height="24" viewBox="0 0 24 24" style="pointer-events:none"><circle cx="12" cy="12" r="10" fill="${color}" stroke="#fff" stroke-width="2" opacity="0.9"/></svg>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        popupAnchor: [0, -14]
      });

      const marker = L.marker([spot.lat, spot.lon], { icon: icon }).addTo(map);

      marker.on('popupopen', () => {
        const btn = document.querySelector('.popup-fav-btn');
        if (btn) {
          btn.addEventListener('click', () => {
            toggleFavorite(spot.name);
            updatePopupFavBtn(spot.name);
            renderFavoritesBar();
          });
        }
      });

      marker.bindPopup(() => {
        const fav = isFavorite(spot.name);
        return `
          <div class="popup-header">
            <div>
              <div class="popup-name">${spot.name}</div>
              <div class="popup-area">${spot.area}</div>
            </div>
            <button class="popup-fav-btn" data-name="${spot.name}">${fav ? '★' : '☆'}</button>
          </div>
          <a class="popup-btn" href="index.html?lat=${spot.lat}&lon=${spot.lon}&name=${encodeURIComponent(spot.name)}&coast=${spot.coast}">コンディションを見る</a>
        `;
      });
    });

    // Build legend
    const legendEl = document.getElementById('legend');
    const areas = [...new Set(SPOTS.map(s => s.area))];
    legendEl.innerHTML = areas.map(area => {
      const color = getAreaColor(area);
      return `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${area}</div>`;
    }).join('');

    // Render favorites bar
    renderFavoritesBar();

    /* --- Email subscribe --- */
    document.getElementById('subscribeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('subscribeEmail').value.trim();
      const msgEl = document.getElementById('subscribeMsg');
      if (!email) return;

      try {
        const res = await fetch(NOTIFY_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        if (res.ok) {
          msgEl.textContent = '登録ありがとうございます！準備ができ次第ご連絡します';
          document.getElementById('subscribeEmail').value = '';
          return;
        }
      } catch {}

      // Fallback: save to localStorage
      try {
        const stored = JSON.parse(localStorage.getItem('nami-kaze-subscribers') || '[]');
        if (!stored.includes(email)) stored.push(email);
        localStorage.setItem('nami-kaze-subscribers', JSON.stringify(stored));
      } catch {}
      msgEl.textContent = '登録ありがとうございます！準備ができ次第ご連絡します';
      document.getElementById('subscribeEmail').value = '';
    });

    /* --- First-visit guide --- */
    if (!localStorage.getItem(GUIDE_KEY)) {
      const overlay = document.createElement('div');
      overlay.className = 'guide-overlay';
      overlay.id = 'guideOverlay';
      overlay.innerHTML = `
        <div class="guide-box">
          <p>地点をタップしてコンディションをチェック！<br>☆でお気に入りに追加できます</p>
          <button class="guide-ok-btn" id="guideOkBtn">OK</button>
        </div>
      `;
      document.body.appendChild(overlay);
      document.getElementById('guideOkBtn').addEventListener('click', () => {
        localStorage.setItem(GUIDE_KEY, '1');
        overlay.remove();
      });
    }
  </script>
</body>
</html>
