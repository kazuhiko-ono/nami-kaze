<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国の波と風 - 全国マップ</title>
  <meta name="theme-color" content="#0b1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="全国の波と風">
  <meta property="og:description" content="全国のビーチの風・波・潮位をリアルタイム表示">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0b1929;
      color: #e0e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      background: #0b1929;
      z-index: 1000;
      position: relative;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
    }

    #map {
      flex: 1;
      min-height: 0;
    }

    .leaflet-popup-content-wrapper {
      background: #122640;
      color: #e0e8f0;
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip {
      background: #122640;
    }
    .leaflet-popup-content {
      margin: 12px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
    }
    .popup-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .popup-area {
      font-size: 11px;
      color: #7aa2c4;
      margin-bottom: 8px;
    }
    .popup-btn {
      display: inline-block;
      padding: 8px 16px;
      background: #1a5276;
      color: #7ec8e3;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.2s;
    }
    .popup-btn:hover {
      background: #1f6b9a;
    }

    .legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(18,38,64,0.92);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      z-index: 1000;
      line-height: 1.8;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">全国の波と風 🌊💨</div>
  </div>

  <div id="map"></div>

  <div class="legend" id="legend"></div>

  <script src="spots.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const AREA_COLORS = {
      '湘南': '#2ecc71',
      '三浦': '#3498db',
      '千葉': '#e67e22',
      '関西': '#e74c3c',
      '四国': '#9b59b6',
      '宮崎': '#f1c40f',
    };

    const DEFAULT_COLOR = '#7ec8e3';

    function getAreaColor(area) {
      return AREA_COLORS[area] || DEFAULT_COLOR;
    }

    // Initialize map
    const map = L.map('map', {
      zoomControl: true,
      attributionControl: true
    }).setView([35.0, 137.0], 6);

    // Dark tile layer
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
    }).addTo(map);

    // Add markers for each spot
    SPOTS.forEach(spot => {
      const color = getAreaColor(spot.area);
      const icon = L.divIcon({
        className: '',
        html: `<svg width="24" height="24" viewBox="0 0 24 24" style="pointer-events:none"><circle cx="12" cy="12" r="10" fill="${color}" stroke="#fff" stroke-width="2" opacity="0.9"/></svg>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
        popupAnchor: [0, -14]
      });

      const marker = L.marker([spot.lat, spot.lon], { icon: icon }).addTo(map);

      const popupContent = `
        <div class="popup-name">${spot.name}</div>
        <div class="popup-area">${spot.area}</div>
        <a class="popup-btn" href="index.html?lat=${spot.lat}&lon=${spot.lon}&name=${encodeURIComponent(spot.name)}&coast=${spot.coast}">コンディションを見る</a>
      `;
      marker.bindPopup(popupContent);
    });

    // Build legend
    const legendEl = document.getElementById('legend');
    const areas = [...new Set(SPOTS.map(s => s.area))];
    legendEl.innerHTML = areas.map(area => {
      const color = getAreaColor(area);
      return `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${area}</div>`;
    }).join('');
  </script>
</body>
</html>
